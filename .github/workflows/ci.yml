name: CI

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r deploy/requirements.lock
      - run: ruff check app tests
      - run: ruff format --check app tests
      - run: PYTHONPATH=. pytest -q
      - run: |
          SECRET_KEY=ci-secret ENCRYPTION_KEY=ci-encryption-key DB_TYPE=sqlite \
          SQLITE_PATH=/tmp/kiro-fleet-ci.db alembic upgrade head

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm audit --audit-level=high

  containers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f deploy/Dockerfile.backend -t kiro-fleet-backend:ci .
      - run: docker build -f deploy/Dockerfile.frontend -t kiro-fleet-frontend:ci .
